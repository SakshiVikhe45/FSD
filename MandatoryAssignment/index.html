<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }
        h1, h2 {
            color: black;
        }
        .container {
            max-width: 700px;
        }
        table {
            border-collapse: collapse;
            margin-top: 10px;
        }
        table, td {
            border: 1px solid black;
            padding: 5px 10px;
        }
        .form-group {
            margin-bottom: 10px;
        }
        input, textarea {
            width: 250px;
            padding: 5px;
        }
        button {
            padding: 5px 10px;
        }
        .footer-text {
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container"> <!-- Non-semantic -->

    <!-- Semantic Header -->
    <header>
        <h1>Welcome to my website!</h1>
        <p>This is the home page of my website.</p>
    </header>

    <!-- Semantic Section -->
    <section>
        <h2>About Me</h2>
        <p>My name is John Doe and I'm a web developer.</p>

        <!-- Ordered List -->
        <ol>
            <li>HTML5</li>
            <li>CSS3</li>
            <li>JavaScript</li>
        </ol>

        <!-- Table -->
        <table>
            <tr>
                <td>Row 1, Column 1</td>
                <td>Row 1, Column 2</td>
            </tr>
            <tr>
                <td>Row 2, Column 1</td>
                <td>Row 2, Column 2</td>
            </tr>
        </table>
    </section>

    <!-- Semantic Section for Contact -->
    <section>
        <h2>Contact Me</h2>

        <form>
            <div class="form-group"> <!-- Non-semantic -->
                <label>Name:</label><br>
                <input type="text" name="name">
            </div>

            <div class="form-group">
                <label>Email:</label><br>
                <input type="email" name="email">
            </div>

            <div class="form-group">
                <label>Message:</label><br>
                <textarea rows="4"></textarea>
            </div>

            <button type="submit">Send</button>
        </form>
    </section>

    <!-- Semantic Footer -->
    <footer class="footer-text">
        <p>Write some content here</p>
        <p>Write some more content here</p>
    </footer>

</div>

</body>
</html>
